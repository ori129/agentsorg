name: Bug Report
description: Something is broken or behaving unexpectedly.
labels: [bug]
assignees:
  - ori129
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, please check [existing issues](https://github.com/ori129/agentsorg/issues)
        and [Discussions](https://github.com/ori129/agentsorg/discussions).
        If you have a question (not a bug), please post in Discussions instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Demo mode
        - Real mode (live API keys)
        - Both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Git tag or commit SHA
      placeholder: v1.2.3 or abc1234
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant output from `make logs`.
      render: shell
