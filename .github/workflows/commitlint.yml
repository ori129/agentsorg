name: Commit Lint

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Enforce conventional commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint PR title
        # We squash merge, so the PR title becomes the only commit on main.
        # Linting the title is sufficient and avoids failing on historical commits.
        run: |
          echo "${{ github.event.pull_request.title }}" | npx commitlint --config - <<'EOF'
          { "extends": ["@commitlint/config-conventional"] }
          EOF
