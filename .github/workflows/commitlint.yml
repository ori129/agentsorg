name: Commit Lint

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Enforce conventional commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint PR title
        # We squash merge — the PR title is the only commit that lands on main.
        # commitlint.config.js in the repo root is picked up automatically.
        # Use env var to prevent script injection via PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint
