name: CLA Check

on:
  pull_request_target:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  statuses: write
  issues: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA'))

    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: 'CLA-individual.md'
          branch: 'main'
          allowlist: bot*,ori129

          # Message posted on PRs where the contributor has not signed
          custom-notsigned-prcomment: |
            Thank you for your contribution!

            Before we can merge this pull request, we need you to sign our
            **Contributor License Agreement (CLA)**.

            Please read [CLA-individual.md](CLA-individual.md) (or
            [CLA-corporate.md](CLA-corporate.md) if contributing on behalf of a company).

            To sign, reply to this comment with exactly:

            > I have read the CLA Document and I hereby sign the CLA

            Your signature will be recorded and this check will update automatically.

          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'

          # Message posted after signing
          custom-allsigned-prcomment: |
            CLA signed. Thank you!
