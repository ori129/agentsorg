name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentsorg
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: agentsorg_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install ruff pytest pytest-asyncio && pip install -r backend/requirements.txt

      - name: Lint
        run: ruff check backend/

      - name: Format check
        run: ruff format --check backend/

      - name: Tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://agentsorg:changeme@localhost:5432/agentsorg_test
        run: cd backend && python -m pytest --tb=short -q

  frontend:
    name: Frontend — type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

  docker-build:
    name: Docker — build all images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build images
        run: docker compose build

  stack-boot:
    name: Docker — full stack boot
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v6

      - name: Generate Fernet key
        run: |
          pip install cryptography
          echo "FERNET_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV

      - name: Start stack
        run: |
          echo "FERNET_KEY=$FERNET_KEY" > .env
          docker compose up -d --wait

      - name: Health check
        run: |
          curl --retry 10 --retry-delay 2 --retry-connrefused \
            --fail http://localhost:8000/api/v1/pipeline/status

      - name: Tear down
        if: always()
        run: docker compose down -v
