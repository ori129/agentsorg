app = "agentsorg-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.demo"

[env]
  COOKIE_SECURE = "true"
  BACKEND_CORS_ORIGINS = "https://agentsorg-demo.fly.dev"
  PUBLIC_URL = "https://agentsorg-demo.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
